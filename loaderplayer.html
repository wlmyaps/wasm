<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WASM Packer V3.2 Loader (URL Mode - Blob)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090d09;color:#4afa7a;font-family:'Courier New',monospace;padding:24px;font-size:14px;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{width:100%;max-width:550px;background:#0c130c;padding:28px;border:1px solid #1d451d;border-radius:3px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
h2{font-size:1.05em;color:#7cff9c;margin-bottom:20px;text-align:center;letter-spacing:1px}
label{display:block;margin:14px 0 4px;font-size:.75em;opacity:.55;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=password]{
  width:100%;background:#0a100a;color:#4afa7a;
  border:1px solid #1d451d;padding:12px;
  font-family:inherit;font-size:.9em;outline:none;margin-bottom:10px
}
input:focus{border-color:#4afa7a}
input::placeholder{opacity:.4}
button{
  width:100%;background:#4afa7a;color:#000;padding:12px;
  border:none;cursor:pointer;font-family:inherit;
  font-weight:bold;font-size:.9em;margin-top:10px;border-radius:2px;
  transition: background 0.2s
}
button:hover{background:#7cff9c}
button:disabled{opacity:0.3;cursor:not-allowed}
#status{
  margin-top:20px;padding:10px;font-size:0.8em;
  border-top:1px solid #1d451d;display:none;
  white-space:pre-wrap;line-height:1.5
}
.err{color:#ff5555}.ok{color:#4afa7a}.w{color:#ffc044}
</style>
</head>
<body>

<div class="box" id="mainBox">
  <h2>🧩 WASM PACKER V3.2 — URL MODE</h2>
  
  <label>WASM URL (GitHub raw link)</label>
  <input type="text" id="wasmUrl" placeholder="https://raw.githubusercontent.com/.../file.wasm" value="">

  <label>Password</label>
  <input type="password" id="pwd" placeholder="Masukkan password (🔓🥰🔓)">

  <button id="btn">🚀 Unlock & Run</button>

  <div id="status"></div>
</div>

<script>
const statusEl = document.getElementById('status');
const btn = document.getElementById('btn');

function log(msg, cls='') {
  statusEl.style.display = 'block';
  statusEl.innerHTML += `<div class="${cls}">${msg}</div>`;
}

btn.onclick = async () => {
  const wasmUrl = document.getElementById('wasmUrl').value.trim();
  const pwd = document.getElementById('pwd').value.trim();

  if (!wasmUrl) { alert('Masukkan URL file .wasm!'); return; }
  if (!pwd) { alert('Masukkan password dekripsi!'); return; }

  statusEl.innerHTML = '';
  btn.disabled = true;

  try {
    log('⏳ Fetching WASM from: ' + wasmUrl);
    const wasmResponse = await fetch(wasmUrl);
    if (!wasmResponse.ok) throw new Error(`HTTP ${wasmResponse.status} — Gagal fetch WASM`);
    const wasmBuffer = await wasmResponse.arrayBuffer();
    
    log('✅ WASM fetched, size: ' + wasmBuffer.byteLength + ' bytes', 'ok');
    log('🔧 Instantiating WebAssembly...');
    
    const { instance } = await WebAssembly.instantiate(wasmBuffer);
    
    // 2. Extract Payload from WASM Memory
    let totalLen = instance.exports.getLen(); 
    
    if (totalLen < 0) {
        totalLen = totalLen >>> 0; 
    }
    if (totalLen > 200 * 1024 * 1024) { 
        throw new Error("Ukuran payload terlalu besar untuk browser ini!");
    }

    const fullPayload = new Uint8Array(instance.exports.mem.buffer, 0, totalLen);
    
    const salt      = fullPayload.slice(0, 16);
    const iv        = fullPayload.slice(16, 28);
    const flags     = fullPayload[28];
    const ciphertext = fullPayload.slice(33);

    log('🔑 Deriving keys (PBKDF2 250k)...', 'w');
    const enc = new TextEncoder();
    const normalizedPwd = pwd.normalize('NFC'); 
    
    const km = await crypto.subtle.importKey('raw', enc.encode(normalizedPwd), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 250000, hash: 'SHA-256' }, 
      km, 
      { name: 'AES-GCM', length: 256 }, 
      false, 
      ['decrypt']
    );

    log('🔓 Decrypting Layer (AES-GCM)...');
    let plain;
    try {
      plain = new Uint8Array(await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv }, key, ciphertext
      ));
    } catch(e) {
      throw new Error("Password salah atau data korup (AES Fail)");
    }

    // 4. Check flags: Jika bit ke-0 (1) aktif, berarti data dikompresi deflate-raw
    if (flags & 1) {
        log('🗜️ Decompressing deflate-raw...', 'w');
        if (!('DecompressionStream' in window)) {
             throw new Error("Browser ini tidak mendukung DecompressionStream!");
        }
        const ds = new DecompressionStream('deflate-raw');
        const writer = ds.writable.getWriter();
        writer.write(plain);
        writer.close();
        plain = new Uint8Array(await new Response(ds.readable).arrayBuffer());
        log('✅ Decompression selesai!', 'ok');
    }

    // 5. Render hasil dekripsi menjadi BLOB URL (UBAH DISINI)
    log('✅ Success! Rendering via Blob URL...', 'ok');
    const htmlString = new TextDecoder().decode(plain);
    const blob = new Blob([htmlString], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.location.replace(url); // Ubah URL address bar jadi blob:

  } catch (e) {
    log('❌ Error: ' + e.message, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
};
</script>
</body>
</html>
